<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direktori Anggota</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6">
    <h1 class="text-3xl font-bold text-center mb-10 text-cyan-400">Direktori Anggota</h1>
    <div id="app" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <p class="text-center col-span-3">Memuat data...</p>
    </div>

    <script>
        fetch('https://script.google.com/macros/s/AKfycbzwCibasAHrlxpim5GfZFef2Awl16tkarBOEUTmbE_HVKRNWTg_fVvlP1v5uSD9XDUF/exec')
            .then(res => res.json())
            .then(data => {
                const app = document.getElementById('app');
                app.innerHTML = data.map(m => `
                    <div class="p-6 border border-gray-800 rounded-2xl bg-gray-900 hover:border-cyan-500 transition-all">
                        <h2 class="text-xl font-bold">${m.Nama}</h2>
                        <p class="text-cyan-400">${m.Jabatan}</p>
                    </div>
                `).join('');
            })
            .catch(() => document.getElementById('app').innerHTML = "Gagal memuat data.");
    </script>
</body>
</html>
